<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>ねこ電卓</title>
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg: #101114;
  --app: #181a1f;
  --panel: #242832;
  --display: #07080a;
  --text: #f8f1df;
  --muted: #b7b0a3;
  --gold: #f3b64a;
  --orange: #df7f24;
  --green: #2d8a52;
  --red: #b34b4b;
  --line: rgba(255,255,255,.12);
}

body.light {
  --bg: #ececec;
  --app: #f7f7f7;
  --panel: #ffffff;
  --display: #ffffff;
  --text: #202020;
  --muted: #666;
  --line: rgba(0,0,0,.12);
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 12px;
  padding-bottom: calc(16px + env(safe-area-inset-bottom));
  background: linear-gradient(180deg, var(--app), var(--bg));
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 24px;
  margin: 6px 0;
  color: var(--gold);
}

button {
  border: none;
  border-radius: 15px;
  height: 56px;
  font-size: 22px;
  color: var(--text);
  background: #333842;
  box-shadow: 0 2px 0 rgba(0,0,0,.25);
}

button:active {
  transform: scale(.96);
}

.mini-btn {
  height: 38px;
  font-size: 15px;
  padding: 0 10px;
  background: var(--panel);
  border: 1px solid var(--line);
}

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 10px;
  margin: 10px 0;
}

.status {
  font-size: 14px;
}

.expbar {
  height: 10px;
  background: rgba(0,0,0,.35);
  border-radius: 999px;
  overflow: hidden;
  margin-top: 7px;
}

#expFill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #54c878, var(--gold));
}

.display {
  background: var(--display);
  border: 1px solid var(--line);
  border-radius: 18px;
  padding: 16px;
  margin: 10px 0;
  text-align: right;
  box-shadow: inset 0 0 16px rgba(0,0,0,.45);
}

#formula {
  min-height: 25px;
  font-size: 17px;
  color: var(--muted);
  word-break: break-all;
}

#result {
  min-height: 52px;
  font-size: 42px;
  font-weight: 800;
  word-break: break-all;
}

.cat-lane {
  position: relative;
  height: 54px;
  margin: 10px 0;
  border-radius: 16px;
  overflow: hidden;
  background: rgba(255,255,255,.075);
  border: 1px solid var(--line);
}

.cat {
  position: absolute;
  left: 0;
  bottom: 7px;
  width: 48px;
  height: 36px;
  pointer-events: none;
  transition: transform .2s;
}

.cat.walk {
  animation: bob .45s infinite alternate;
}

@keyframes bob {
  from { bottom: 6px; }
  to { bottom: 9px; }
}

.cat-body {
  position: absolute;
  left: 12px;
  bottom: 0;
  width: 31px;
  height: 22px;
  background: #f6eedc;
  border-radius: 50%;
}

.cat-spot {
  position: absolute;
  left: 22px;
  bottom: 13px;
  width: 13px;
  height: 10px;
  background: #b77a47;
  border-radius: 50%;
}

.cat-head {
  position: absolute;
  left: 1px;
  bottom: 12px;
  width: 25px;
  height: 23px;
  background: #f6eedc;
  border-radius: 50%;
}

.cat-head::before,
.cat-head::after {
  content: "";
  position: absolute;
  top: -6px;
  width: 10px;
  height: 10px;
  background: #f6eedc;
  clip-path: polygon(50% 0, 0 100%, 100% 100%);
}

.cat-head::before {
  left: 2px;
}

.cat-head::after {
  right: 2px;
}

.cat-face {
  position: absolute;
  top: 8px;
  left: 4px;
  font-size: 10px;
  color: #222;
  white-space: nowrap;
}

.cat-tail {
  position: absolute;
  right: -2px;
  bottom: 12px;
  width: 17px;
  height: 10px;
  border-top: 5px solid #b77a47;
  border-radius: 50%;
}

.cat.sleep .cat-face::after {
  content: " Zzz";
  color: #8ab8ff;
  font-size: 12px;
}

.message {
  text-align: center;
  min-height: 24px;
  color: var(--gold);
  font-size: 14px;
  margin: 5px 0 8px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.func {
  font-size: 15px;
  background: #555b66;
}

.op {
  background: var(--orange);
  color: #fff;
}

.equal {
  background: var(--gold);
  color: #241506;
  font-weight: 800;
}

.tax {
  background: var(--green);
  color: #fff;
  font-size: 15px;
}

.danger {
  background: var(--red);
  color: #fff;
  font-size: 15px;
}

.card h2 {
  font-size: 16px;
  margin: 0 0 8px;
  color: var(--gold);
}

.memory-row {
  display: grid;
  grid-template-columns: 30px 1fr 48px 48px;
  gap: 6px;
  align-items: center;
  margin: 6px 0;
}

.memory-row input {
  width: 100%;
  padding: 7px;
  border: none;
  border-radius: 8px;
}

.memory-row button {
  height: 34px;
  font-size: 13px;
  border-radius: 10px;
}

.graph-row {
  display: grid;
  grid-template-columns: 30px 1fr 76px;
  gap: 6px;
  align-items: center;
  margin: 7px 0;
  font-size: 13px;
}

.graph-bg {
  height: 14px;
  background: rgba(255,255,255,.15);
  border-radius: 999px;
  overflow: hidden;
}

.graph-fill {
  height: 100%;
  width: 0%;
  background: var(--gold);
}

.summary {
  font-size: 14px;
  color: var(--muted);
  margin-top: 8px;
}

.history {
  max-height: 165px;
  overflow: auto;
}

.history-item {
  padding: 7px 4px;
  border-bottom: 1px solid var(--line);
  font-size: 14px;
  cursor: pointer;
}

.history-item small {
  display: block;
  color: var(--muted);
}

.rare {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,.92);
  align-items: center;
  justify-content: center;
  padding: 18px;
}

.rare-box {
  width: min(390px, 96vw);
  max-height: 94vh;
  overflow: auto;
  text-align: center;
  background: #111;
  border: 2px solid var(--gold);
  border-radius: 20px;
  padding: 12px;
  color: #fff;
  box-shadow: 0 0 24px rgba(243,182,74,.45);
}

.rare-box h2 {
  margin: 6px 0;
  color: var(--gold);
}

.rare-box img {
  width: 100%;
  border-radius: 14px;
  display: block;
}

.light button {
  color: #222;
  background: #ddd;
}

.light .op,
.light .tax,
.light .equal,
.light .danger {
  color: #fff;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>🐾 ねこ電卓</h1>
    <button class="mini-btn" onclick="toggleTheme()">🌙/☀️</button>
  </div>

  <div class="card status">
    Lv.<span id="level">1</span>
    / EXP <span id="exp">0</span>/<span id="need">10</span>
    / 💰 <span id="coin">0</span>

    <div class="expbar">
      <div id="expFill"></div>
    </div>
  </div>

  <div class="display">
    <div id="formula"></div>
    <div id="result">0</div>
  </div>

  <div class="cat-lane">
    <div id="cat" class="cat walk">
      <div class="cat-tail"></div>
      <div class="cat-body"></div>
      <div class="cat-spot"></div>
      <div class="cat-head">
        <div class="cat-face">•ᴗ•</div>
      </div>
    </div>
  </div>

  <div id="message" class="message">計算するにゃ！</div>

  <div class="buttons">
    <button class="func" onclick="clearAll()">C</button>
    <button class="func" onclick="backspace()">⌫</button>
    <button class="func" onclick="undo()">↶</button>
    <button class="op" onclick="append('/')">÷</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button class="op" onclick="append('*')">×</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button class="op" onclick="append('-')">−</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="op" onclick="append('+')">＋</button>

    <button onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
    <button class="equal" onclick="calculate()">=</button>
    <button class="func" onclick="toggleSign()">±</button>

    <button class="tax" onclick="divideBy11()">÷11</button>
    <button class="tax" onclick="taxExcluded()">税抜</button>
    <button class="tax" onclick="taxAmount()">税額</button>
    <button class="danger" onclick="clearHistory()">履歴消</button>
  </div>

  <div class="card">
    <h2>📌 保存メモリー A〜E</h2>
    <div id="memoryArea"></div>

    <div class="summary">
      例：A+B+C、A+B-C のように式へ入れて計算できます。
    </div>

    <h2 style="margin-top:12px;">📊 メモリーグラフ</h2>
    <div id="graphArea"></div>
    <div id="memoryTotal" class="summary"></div>
  </div>

  <div class="card history">
    <h2>📜 計算履歴（タップで再利用）</h2>
    <div id="historyList"></div>
  </div>

  <div class="summary" style="text-align:center;">
    Ver1.0 / icon.png と guan_harley_rare.png を同じ場所に置く
  </div>

</div>

<div id="rare" class="rare">
  <div class="rare-box">
    <h2>✨超激レア発生✨</h2>
    <img src="guan_harley_rare.png" alt="関羽ハーレー">
    <p>関羽、ハーレーで参上！</p>
    <button class="equal" onclick="closeRare()">OK</button>
  </div>
</div>

<script>
let formula = "";
let undoStack = [];

let history = JSON.parse(
  localStorage.getItem("nekoCalcHistory") || "[]"
);

let level = Number(localStorage.getItem("nekoLevel") || 1);
let exp = Number(localStorage.getItem("nekoExp") || 0);
let need = Number(localStorage.getItem("nekoNeed") || 10);
let coin = Number(localStorage.getItem("nekoCoin") || 0);

let memories = JSON.parse(
  localStorage.getItem("nekoMemories") ||
  JSON.stringify({
    A: { label: "A", value: 0 },
    B: { label: "B", value: 0 },
    C: { label: "C", value: 0 },
    D: { label: "D", value: 0 },
    E: { label: "E", value: 0 }
  })
);

const formulaEl = document.getElementById("formula");
const resultEl = document.getElementById("result");
const msgEl = document.getElementById("message");
const cat = document.getElementById("cat");
const face = cat.querySelector(".cat-face");

function say(text) {
  msgEl.textContent = text;
}

function pushUndo() {
  undoStack.push(formula);

  if (undoStack.length > 50) {
    undoStack.shift();
  }
}

function updateDisplay() {
  formulaEl.textContent = formula;
  resultEl.textContent = formula || "0";
}

function save() {
  localStorage.setItem("nekoCalcHistory", JSON.stringify(history));
  localStorage.setItem("nekoLevel", level);
  localStorage.setItem("nekoExp", exp);
  localStorage.setItem("nekoNeed", need);
  localStorage.setItem("nekoCoin", coin);
  localStorage.setItem("nekoMemories", JSON.stringify(memories));
}

function updateStatus() {
  document.getElementById("level").textContent = level;
  document.getElementById("exp").textContent = exp;
  document.getElementById("need").textContent = need;
  document.getElementById("coin").textContent = coin;

  document.getElementById("expFill").style.width =
    Math.min(100, (exp / need) * 100) + "%";

  save();
}

function append(value) {
  pushUndo();
  formula += value;
  updateDisplay();
}

function clearAll() {
  pushUndo();
  formula = "";
  updateDisplay();
  say("すっきりしたにゃ！");
}

function backspace() {
  pushUndo();
  formula = formula.slice(0, -1);
  updateDisplay();
}

function undo() {
  if (undoStack.length > 0) {
    formula = undoStack.pop();
    updateDisplay();
    say("戻したにゃ");
  }
}

function toggleSign() {
  if (!formula) return;

  pushUndo();

  if (formula.startsWith("-")) {
    formula = formula.slice(1);
  } else {
    formula = "-" + formula;
  }

  updateDisplay();
}

function sanitizeExpr(expr) {
  return expr
    .replace(/×/g, "*")
    .replace(/÷/g, "/")
    .replace(/＋/g, "+")
    .replace(/−/g, "-");
}

function replaceMemories(expr) {
  return expr.replace(/\b[A-E]\b/g, key => {
    return String(Number(memories[key]?.value || 0));
  });
}

function evalFormula(expr) {
  const calcExpr = replaceMemories(sanitizeExpr(expr));

  const answer = Function(
    '"use strict"; return (' + calcExpr + ')'
  )();

  if (!Number.isFinite(Number(answer))) {
    throw new Error("bad calculation");
  }

  return answer;
}

function calculate() {
  if (!formula) return;

  try {
    const before = formula;
    const answer = evalFormula(formula);

    formula = String(answer);

    formulaEl.textContent = before + " =";
    resultEl.textContent = formula;

    addHistory(before, answer);
    gain();
    happy();

    if (Math.random() <= 0.001) {
      showRare();
    }

  } catch (error) {
    resultEl.textContent = "ERROR";
    errorCat();
  }
}

function addHistory(before, answer) {
  history.unshift({
    before: before,
    answer: answer,
    time: new Date().toLocaleString()
  });

  history = history.slice(0, 40);

  renderHistory();
  save();
}

function renderHistory() {
  const list = document.getElementById("historyList");
  list.innerHTML = "";

  if (history.length === 0) {
    list.innerHTML =
      '<div class="history-item">まだ履歴はないにゃ</div>';
    return;
  }

  history.forEach(item => {
    const div = document.createElement("div");
    div.className = "history-item";

    div.innerHTML =
      item.before +
      " = " +
      item.answer +
      "<small>" +
      item.time +
      "</small>";

    div.onclick = () => {
      formula = String(item.before);
      updateDisplay();
      say("履歴から復元したにゃ");
    };

    list.appendChild(div);
  });
}

function clearHistory() {
  history = [];
  renderHistory();
  save();
  say("履歴を消したにゃ");
}

function gain() {
  exp += 1;
  coin += 5;

  if (exp >= need) {
    exp -= need;
    level += 1;
    need = Math.floor(need * 1.35) + 1;
    levelUp();
  } else {
    say("計算できたにゃ！ +5コイン");
  }

  updateStatus();
}

function divideBy11() {
  if (!formula) return;

  try {
    pushUndo();
    const value = Number(evalFormula(formula));
    formula = String((value / 11).toFixed(2));
    updateDisplay();
    say("÷11したにゃ");
  } catch {
    errorCat();
  }
}

function taxExcluded() {
  if (!formula) return;

  try {
    pushUndo();
    const value = Number(evalFormula(formula));
    formula = String((value / 1.1).toFixed(2));
    updateDisplay();
    say("税抜にしたにゃ");
  } catch {
    errorCat();
  }
}

function taxAmount() {
  if (!formula) return;

  try {
    pushUndo();
    const value = Number(evalFormula(formula));
    formula = String((value - value / 1.1).toFixed(2));
    updateDisplay();
    say("税額だにゃ");
  } catch {
    errorCat();
  }
}

function renderMemories() {
  const area = document.getElementById("memoryArea");
  area.innerHTML = "";

  ["A", "B", "C", "D", "E"].forEach(key => {
    const row = document.createElement("div");
    row.className = "memory-row";

    row.innerHTML = `
      <b>${key}</b>
      <input value="${memories[key].label}" onchange="renameMemory('${key}', this.value)">
      <button onclick="saveMemory('${key}')">保存</button>
      <button onclick="insertMemory('${key}')">挿入</button>
    `;

    area.appendChild(row);
  });

  renderGraph();
}

function renameMemory(key, value) {
  memories[key].label = value.trim() || key;
  save();
  renderGraph();
}

function saveMemory(key) {
  try {
    const value = Number(evalFormula(formula));

    memories[key].value = value;

    save();
    renderMemories();
    say(key + "に保存したにゃ");

  } catch {
    say("保存できる数字じゃないにゃ");
  }
}

function insertMemory(key) {
  pushUndo();
  formula += key;
  updateDisplay();
  say(key + "を入れたにゃ");
}

function renderGraph() {
  const area = document.getElementById("graphArea");
  area.innerHTML = "";

  const keys = ["A", "B", "C", "D", "E"];

  const values = keys.map(key => {
    return Math.abs(Number(memories[key].value || 0));
  });

  const max = Math.max(...values, 1);

  let total = 0;

  keys.forEach(key => {
    const value = Number(memories[key].value || 0);
    total += value;

    const width = Math.min(100, Math.abs(value) / max * 100);

    const row = document.createElement("div");
    row.className = "graph-row";

    row.innerHTML = `
      <b>${key}</b>
      <div class="graph-bg">
        <div class="graph-fill" style="width:${width}%"></div>
      </div>
      <span>${value}</span>
    `;

    area.appendChild(row);
  });

  document.getElementById("memoryTotal").textContent =
    "A〜E合計：" + total;
}

function setFace(text, ms = 1200) {
  face.textContent = text;

  setTimeout(() => {
    face.textContent = "•ᴗ•";
  }, ms);
}

function happy() {
  setFace("≧ᴗ≦");
  say("やったにゃ！");
}

function errorCat() {
  setFace("°ロ°");
  say("にゃ！？ 計算エラー");
}

function levelUp() {
  setFace("★ᴗ★", 2000);
  say("レベルアップにゃ！");
}

let catX = 0;
let catDir = 1;
let sleeping = false;

setInterval(() => {
  if (sleeping) return;

  const lane = document.querySelector(".cat-lane");
  const maxX = lane.clientWidth - 50;

  catX += catDir * 1.25;

  if (catX >= maxX) {
    catDir = -1;
    cat.style.transform = "scaleX(-1)";
  }

  if (catX <= 0) {
    catDir = 1;
    cat.style.transform = "scaleX(1)";
  }

  cat.style.left = catX + "px";
}, 35);

setInterval(() => {
  if (Math.random() < 0.23 && !sleeping) {
    sleeping = true;

    cat.classList.add("sleep");
    face.textContent = "－ᴗ－";
    say("ちょっと寝るにゃ…");

    setTimeout(() => {
      sleeping = false;
      cat.classList.remove("sleep");
      face.textContent = "•ᴗ•";
      say("起きたにゃ！");
    }, 4000);
  }
}, 14000);

function toggleTheme() {
  document.body.classList.toggle("light");

  localStorage.setItem(
    "nekoTheme",
    document.body.classList.contains("light") ? "light" : "dark"
  );
}

function showRare() {
  face.textContent = "°ロ°";
  say("関羽だにゃ！？");
  document.getElementById("rare").style.display = "flex";
}

function closeRare() {
  document.getElementById("rare").style.display = "none";
  face.textContent = "•ᴗ•";
}

document.addEventListener("keydown", event => {
  if ("0123456789+-*/.".includes(event.key)) {
    append(event.key);
  }

  if (["A", "B", "C", "D", "E", "a", "b", "c", "d", "e"].includes(event.key)) {
    append(event.key.toUpperCase());
  }

  if (event.key === "Enter") {
    calculate();
  }

  if (event.key === "Backspace") {
    backspace();
  }

  if (event.key === "Escape") {
    clearAll();
  }
});

if (localStorage.getItem("nekoTheme") === "light") {
  document.body.classList.add("light");
}

renderHistory();
renderMemories();
updateStatus();
updateDisplay();
</script>

</body>
</html>
